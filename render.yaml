databases:
  - name: essassess-postgres
    databaseName: essassess
    user: essassess
    plan: free
    region: oregon

services:
  # ── Backend (FastAPI) ─────────────────────────────────────────────────────
  - type: web
    name: essassess-backend
    runtime: python
    rootDir: backend
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: essassess-postgres
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: GOOGLE_API_KEY
        sync: false          # free — set this to use Gemini 1.5 Flash for testing
      - key: ANTHROPIC_API_KEY
        sync: false          # paid — set this later to upgrade to Claude
      - key: OPENAI_API_KEY
        sync: false          # optional — only needed for RAG knowledge base
      - key: JWT_SECRET_KEY
        generateValue: true  # Render generates a secure random value
      - key: JWT_REFRESH_SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        sync: false          # set to frontend URL after first deploy

  # Frontend is deployed separately on Vercel (vercel.com)
